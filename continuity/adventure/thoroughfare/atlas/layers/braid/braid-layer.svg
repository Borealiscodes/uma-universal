<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="400"
  viewBox="0 0 1200 400"
>
  <!-- Step 8: First gentle brushstroke -->
  <text
    x="50"
    y="50"
    fill="#C7D0FF"
    font-size="20"
    font-family="system-ui, sans-serif"
  >
    Braid Layer — First Brushstroke
  </text>
</svg>

  <!-- Step 13: Direction Anchor -->
  <g id="direction-anchor">
    <line
      x1="100"
      y1="120"
      x2="300"
      y2="120"
      stroke="#8FA8FF"
      stroke-width="2"
      stroke-dasharray="6 6"
    />
  </g>
