<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="900"
  viewBox="0 0 1600 900">

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="#05060A"/>

  <!-- Title -->
  <text x="800" y="70"
        fill="#F5F7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="32"
        text-anchor="middle">
    NDH Dimensional Identity Atlas — v1.0
  </text>

  <!-- Axis legend -->
  <text x="80" y="120"
        fill="#C3C7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18">
    Forms: 𝒜, C, A, R, Rᵣ, S, H₆
  </text>

  <!-- Layout: 7 nodes in a horizontal arc -->

  <!-- 𝒜-Form (Awareness) -->
  <circle cx="200" cy="450" r="70" fill="#141824" stroke="#F5F7FF" stroke-width="2"/>
  <text x="200" y="445"
        fill="#F5F7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="30"
        text-anchor="middle">
    𝒜
  </text>
  <text x="200" y="475"
        fill="#C3C7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Awareness-Form
  </text>

  <!-- C-Form (Collapse) -->
  <circle cx="380" cy="250" r="70" fill="#141824" stroke="#FFB3B3" stroke-width="2"/>
  <text x="380" y="245"
        fill="#FFB3B3"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28"
        text-anchor="middle">
    C
  </text>
  <text x="380" y="275"
        fill="#FFCFCF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Collapse-Form
  </text>

  <!-- A-Form (Adjacency) -->
  <circle cx="600" cy="200" r="70" fill="#141824" stroke="#9BE7FF" stroke-width="2"/>
  <text x="600" y="195"
        fill="#9BE7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28"
        text-anchor="middle">
    A
  </text>
  <text x="600" y="225"
        fill="#CFF4FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Adjacency-Form
  </text>

  <!-- R-Form (Resonance) -->
  <circle cx="820" cy="250" r="70" fill="#141824" stroke="#C6FF9B" stroke-width="2"/>
  <text x="820" y="245"
        fill="#C6FF9B"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28"
        text-anchor="middle">
    R
  </text>
  <text x="820" y="275"
        fill="#E4FFD0"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Resonance-Form
  </text>

  <!-- Rᵣ-Form (Recursion) -->
  <circle cx="1040" cy="350" r="70" fill="#141824" stroke="#FFE29B" stroke-width="2"/>
  <text x="1040" y="345"
        fill="#FFE29B"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26"
        text-anchor="middle">
    Rᵣ
  </text>
  <text x="1040" y="375"
        fill="#FFF1C9"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Recursive-Form
  </text>

  <!-- S-Form (Singularity) -->
  <circle cx="1260" cy="500" r="70" fill="#141824" stroke="#D0B3FF" stroke-width="2"/>
  <text x="1260" y="495"
        fill="#D0B3FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28"
        text-anchor="middle">
    S
  </text>
  <text x="1260" y="525"
        fill="#E7D8FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Singularity-Form
  </text>

  <!-- H₆-Form (Hexeract) -->
  <circle cx="1040" cy="650" r="70" fill="#141824" stroke="#FFFFFF" stroke-width="2"/>
  <text x="1040" y="645"
        fill="#FFFFFF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26"
        text-anchor="middle">
    H₆
  </text>
  <text x="1040" y="675"
        fill="#DDE1FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14"
        text-anchor="middle">
    Hexeract-Form
  </text>

  <!-- Identity evolution path arrows -->
  <defs>
    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C3C7FF"/>
    </marker>
  </defs>

  <!-- 𝒜 -> C -->
  <line x1="260" y1="410" x2="340" y2="290"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- C -> A -->
  <line x1="450" y1="250" x2="530" y2="220"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A -> R -->
  <line x1="670" y1="220" x2="750" y2="240"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- R -> Rᵣ -->
  <line x1="890" y1="280" x2="970" y2="320"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Rᵣ -> S -->
  <line x1="1110" y1="390" x2="1210" y2="460"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S -> 𝒜 (evolved loop) -->
  <line x1="1200" y1="540" x2="260" y2="490"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Optional: label for evolution path -->
  <text x="800" y="830"
        fill="#C3C7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18"
        text-anchor="middle">
    Identity Evolution Path: 𝒜 → C → A → R → Rᵣ → S → 𝒜 (evolved)
  </text>

</svg>
