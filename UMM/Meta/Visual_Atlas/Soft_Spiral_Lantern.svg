<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">
    <!-- Soft Spiral Lantern SVG -->
    <g fill="none">
        <!-- Spiral Core -->
        <path d="M125,125 C140,125 155,140 160,160 C165,180 150,195 130,200 C110,205 85,190 75,170 C60,150 70,130 125,125"
              stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Soft Radial Arms -->
        <line x1="125" y1="125" x2="180" y2="140" stroke="#000" stroke-width="1.5"/>
        <line x1="125" y1="125" x2="160" y2="190" stroke="#000" stroke-width="1.5"/>
        <line x1="125" y1="125" x2="80" y2="150" stroke="#000" stroke-width="1.5"/>
        <line x1="125" y1="125" x2="95" y2="200" stroke="#000" stroke-width="1.5"/>
        <!-- Lantern Boundary -->
        <path d="M125,20 Q200,60 200,150 Q200,220 125,230 Q50,220 50,150 Q50,60 125,20"
              stroke="#000" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <!-- Glow Gradient -->
        <defs>
            <radialGradient id="softGlow" cx="125" cy="125" r="100" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#F0F0F0"/>
                <stop offset="100%" stop-color="#E0E0E0"/>
            </radialGradient>
        </defs>
        <!-- Background Glow -->
        <rect x="0" y="0" width="250" height="250" fill="url(#softGlow)"/>
    </g>
</svg>
