<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="800"
  height="800"
  viewBox="0 0 800 800">

  <!-- Background -->
  <rect x="0" y="0" width="800" height="800" fill="white" />

  <!-- Helper group: tesseract projection -->
  <g id="tesseract" stroke="black" stroke-width="1.5" fill="none">
    <rect x="0" y="0" width="120" height="120" />
    <rect x="20" y="20" width="80" height="80" />
    <line x1="0" y1="0" x2="20" y2="20" />
    <line x1="120" y1="0" x2="100" y2="20" />
    <line x1="0" y1="120" x2="20" y2="100" />
    <line x1="120" y1="120" x2="100" y2="100" />
  </g>

  <!-- MODULE POSITIONS -->
  <!-- We'll place four key modules in a diamond layout -->

  <!-- Top module -->
  <g id="mod_top" transform="translate(340, 80)">
    <use href="#tesseract" />
  </g>

  <!-- Left module -->
  <g id="mod_left" transform="translate(80, 340)">
    <use href="#tesseract" />
  </g>

  <!-- Right module -->
  <g id="mod_right" transform="translate(600, 340)">
    <use href="#tesseract" />
  </g>

  <!-- Bottom module -->
  <g id="mod_bottom" transform="translate(340, 600)">
    <use href="#tesseract" />
  </g>

  <!-- CENTER MODULE (hub of entanglement) -->
  <g id="mod_center" transform="translate(340, 340)">
    <use href="#tesseract" />
  </g>

  <!-- ENTANGLEMENT LINKS (tensor-like connections) -->
  <!-- Lines from center to each peripheral module -->

  <!-- Center to top -->
  <line
    x1="400" y1="400"
    x2="400" y2="200"
    stroke="black" stroke-width="2" />

  <!-- Center to bottom -->
  <line
    x1="400" y1="400"
    x2="400" y2="600"
    stroke="black" stroke-width="2" />

  <!-- Center to left -->
  <line
    x1="400" y1="400"
    x2="200" y2="400"
    stroke="black" stroke-width="2" />

  <!-- Center to right -->
  <line
    x1="400" y1="400"
    x2="600" y2="400"
    stroke="black" stroke-width="2" />

  <!-- Optional: small circles at connection points -->
  <circle cx="400" cy="400" r="5" fill="black" />
  <circle cx="400" cy="200" r="4" fill="black" />
  <circle cx="400" cy="600" r="4" fill="black" />
  <circle cx="200" cy="400" r="4" fill="black" />
  <circle cx="600" cy="400" r="4" fill="black" />

  <!-- Title -->
  <text
    x="400"
    y="40"
    text-anchor="middle"
    font-family="monospace"
    font-size="18"
    fill="black">
    UMA – Entanglement Tensor (Cross-Module Constraint Links)
  </text>
</svg>
